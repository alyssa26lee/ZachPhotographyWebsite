<!DOCTYPE html>
<html>
<head>
  <title>Contact | Your Name Photography</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Your Name Photography</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="pricing.html">Pricing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="page-hero">
  <h2>Contact</h2>
  <p>Ready to book a session? Send me a message below.</p>
</section>

<section>
  <form class="contact-section">
    <label>Name</label>
    <input type="text" placeholder="Your name">

    <label>Email</label>
    <input type="email" placeholder="Your email">

    <label>Session Type</label>
    <select>
      <option>Mini Session</option>
      <option>Standard Session</option>
      <option>Premium Session</option>
      <option>Other</option>
    </select>

    <label>Message</label>
    <textarea placeholder="Tell me about what you are looking for..."></textarea>

    <button type="submit">Send Message</button>
  </form>
</section>

</body>
</html>
